<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YIGA | Youth in Global Affairs</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23dc2626'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>Y</text></svg>">
    <style>
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: Arial, sans-serif; 
        }
        body { 
            background-color: #ffffff; 
            color: #333; 
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px; 
        }
        nav { 
            background: #f8f9fa; 
            padding: 15px; 
            position: relative;
            z-index: 100;
        }
        nav a { 
            margin: 0 15px; 
            cursor: pointer; 
            color: #dc2626; 
            text-decoration: none;
            font-weight: bold;
            padding: 10px;
            display: inline-block;
        }
        nav a:hover {
            background: #dc2626;
            color: white;
            border-radius: 4px;
        }
        .page { 
            display: none; 
            padding: 40px 20px;
            position: relative;
            z-index: 10;
        }
        .active { 
            display: block; 
        }
        input, button, select {
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #dc2626;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            position: relative;
            z-index: 50;
        }
        button {
            background: #dc2626;
            color: white;
            font-weight: bold;
        }
        button:hover {
            background: #b91c1c;
        }
    </style>
</head>
<body>
    <nav>
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('about')">About</a>
        <a onclick="showPage('get-involved')">Get Involved</a>
    </nav>

    <div id="home" class="page active">
        <div class="container">
            <h1>Youth in Global Affairs</h1>
            <p>Welcome to YIGA - Empowering young leaders</p>
            <button onclick="alert('Home button works!')">Test Button</button>
        </div>
    </div>

    <div id="about" class="page">
        <div class="container">
            <h1>About Us</h1>
            <p>Learn about YIGA's mission and vision.</p>
        </div>
    </div>

    <div id="get-involved" class="page">
        <div class="container">
            <h1>Get Involved</h1>
            <form onsubmit="alert('Form submitted!'); return false;">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <select>
                    <option>Select Program</option>
                    <option>Foreign Policy</option>
                    <option>Good Governance</option>
                </select>
                <button type="submit">Join Now</button>
            </form>
        </div>
    </div>

    <script>
        function showPage(pageId) {
            // Hide all pages
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });
            // Show target page
            document.getElementById(pageId).classList.add('active');
        }
        
        // Test that JavaScript is working
        console.log('Website loaded - clicking should work now!');
        alert('Website loaded! Try clicking the navigation and buttons.');
    </script>
</body>
</html>
