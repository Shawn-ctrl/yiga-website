<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YIGA | Youth in Global Affairs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Your existing CSS styles here - I'll keep them short for this example */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
        :root { --primary: #dc2626; --secondary: #000000; --accent: #dc2626; --light: #ffffff; --dark: #000000; --text: #374151; }
        body { background-color: #ffffff; color: var(--text); line-height: 1.6; }
        .container { width: 90%; max-width: 1200px; margin: 0 auto; padding: 0 15px; }
        .btn { display: inline-block; padding: 10px 25px; background-color: var(--accent); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background-color: white; padding: 30px; border-radius: 8px; width: 100%; max-width: 400px; }
        /* Add your full CSS here */
    </style>
</head>
<body>
    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <div class="container admin-container">
            <div class="admin-info">
                <i class="fas fa-user-shield"></i>
                <span>Admin Panel - Welcome, <span id="adminName">Admin</span></span>
                <span class="stat-label">Role: <span id="adminRole">Admin</span></span>
            </div>
            <div class="admin-actions">
                <button class="btn btn-small" onclick="viewDashboard()">Dashboard</button>
                <button class="btn btn-small btn-secondary" onclick="logoutAdmin()">Logout</button>
            </div>
        </div>
    </div>

    <!-- Header and other content -->
    <header>
        <div class="container header-container">
            <div class="logo">
                <span class="logo-icon">??</span>
                <h1>YIGA</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#" class="nav-link active" data-page="home">Home</a></li>
                    <li><a href="#" class="nav-link" data-page="about">About</a></li>
                    <li><a href="#" class="nav-link" id="adminLoginLink" onclick="showLoginModal()">Admin Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Admin Login</h3>
                <button class="close-modal" onclick="closeLoginModal()">&times;</button>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Login</button>
            </form>
        </div>
    </div>

    <!-- Add Admin Modal -->
    <div class="modal" id="addAdminModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Add New Admin</h3>
                <button class="close-modal" onclick="closeAddAdminModal()">&times;</button>
            </div>
            <form id="addAdminForm">
                <div class="form-group">
                    <label for="newAdminUsername">Username</label>
                    <input type="text" id="newAdminUsername" required>
                </div>
                <div class="form-group">
                    <label for="newAdminPassword">Password</label>
                    <input type="password" id="newAdminPassword" required>
                </div>
                <div class="form-group">
                    <label for="newAdminRole">Role</label>
                    <select id="newAdminRole" required>
                        <option value="admin">Admin</option>
                        <option value="superadmin">Super Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Create Admin</button>
            </form>
        </div>
    </div>

    <!-- Admin Dashboard -->
    <section id="admin-dashboard" class="page-content">
        <div class="container">
            <div class="admin-dashboard">
                <div class="dashboard-header">
                    <h3>Admin Dashboard</h3>
                </div>

                <!-- Admin Management Section -->
                <div class="admin-management" id="adminManagementSection" style="display: none; margin-top: 40px; padding: 20px; background: #f8f9fa; border-radius: 8px;">
                    <div class="dashboard-header">
                        <h3>Admin User Management</h3>
                        <button class="btn btn-small btn-success" onclick="showAddAdminModal()">Add New Admin</button>
                    </div>
                    <div class="admin-list" id="adminList">
                        <p style="text-align: center;">Loading admins...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Base API URL
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:5000/api'
            : 'https://yiga-backend-99s1bb3kh-shawns-projects-3c3454ff.vercel.app/api';

        let currentAuthToken = null;
        let currentAdmin = null;

        // Admin Management Functions
        function showAddAdminModal() {
            document.getElementById('addAdminModal').classList.add('active');
        }

        function closeAddAdminModal() {
            document.getElementById('addAdminModal').classList.remove('active');
            document.getElementById('addAdminForm').reset();
        }

        async function loadAdmins() {
            try {
                const response = await fetch(`${API_BASE}/admins`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${currentAuthToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    const admins = await response.json();
                    displayAdmins(admins);
                }
            } catch (error) {
                document.getElementById('adminList').innerHTML = '<p style="text-align: center; color: red;">Failed to load admins</p>';
            }
        }

        function displayAdmins(admins) {
            const adminList = document.getElementById('adminList');
            if (admins.length === 0) {
                adminList.innerHTML = '<p style="text-align: center;">No admins found.</p>';
                return;
            }

            adminList.innerHTML = `
                <table class="applications-table">
                    <thead>
                        <tr>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${admins.map(admin => `
                            <tr>
                                <td>${admin.username}</td>
                                <td><span class="status-${admin.role}">${admin.role}</span></td>
                                <td>
                                    ${admin.username !== 'superadmin' && admin.id !== currentAdmin.id ?
                                        `<button class="btn btn-small btn-danger" onclick="deleteAdmin(${admin.id})">Delete</button>` :
                                        `<span style="color: #666;">Protected</span>`
                                    }
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function deleteAdmin(adminId) {
            if (!confirm('Are you sure you want to delete this admin?')) return;
            try {
                const response = await fetch(`${API_BASE}/admins/${adminId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${currentAuthToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    await loadAdmins();
                    alert('Admin deleted successfully!');
                }
            } catch (error) {
                alert('Failed to delete admin');
            }
        }

        document.getElementById('addAdminForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = {
                username: document.getElementById('newAdminUsername').value,
                password: document.getElementById('newAdminPassword').value,
                role: document.getElementById('newAdminRole').value
            };

            try {
                const response = await fetch(`${API_BASE}/admins`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${currentAuthToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    closeAddAdminModal();
                    await loadAdmins();
                    alert('Admin created successfully!');
                }
            } catch (error) {
                alert('Failed to create admin');
            }
        });

        async function viewDashboard() {
            if (!currentAuthToken) {
                alert("Please log in first");
                showLoginModal();
                return;
            }

            document.getElementById('admin-dashboard').classList.add('active');
            
            if (currentAdmin.role === "superadmin") {
                document.getElementById('adminManagementSection').style.display = 'block';
                await loadAdmins();
            }
        }

        // Login functions
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('active');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    currentAuthToken = result.token;
                    currentAdmin = {
                        username: result.username,
                        role: result.role,
                        name: result.username
                    };

                    document.getElementById('adminPanel').classList.add('active');
                    document.getElementById('adminLoginLink').style.display = 'none';
                    document.getElementById('adminName').textContent = currentAdmin.name;
                    document.getElementById('adminRole').textContent = currentAdmin.role;

                    closeLoginModal();
                    alert(`Welcome, ${currentAdmin.name} (${currentAdmin.role})!`);
                }
            } catch (error) {
                alert('Network error. Please check if the backend server is running.');
            }
        });

        function logoutAdmin() {
            currentAuthToken = null;
            currentAdmin = null;
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('adminLoginLink').style.display = 'block';
        }
    </script>
</body>
</html>
