<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YIGA | Youth in Global Affairs</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23dc2626'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>Y</text></svg>">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        nav a { margin: 0 10px; cursor: pointer; color: #dc2626; }
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <nav>
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('about')">About</a>
        <a onclick="showPage('get-involved')">Get Involved</a>
    </nav>
    
    <div id="home" class="page active">
        <h1>Youth in Global Affairs</h1>
        <p>Welcome to YIGA</p>
    </div>
    
    <div id="about" class="page">
        <h1>About Us</h1>
        <p>Learn about YIGA</p>
    </div>
    
    <div id="get-involved" class="page">
        <h1>Get Involved</h1>
        <form>
            <input type="text" placeholder="Your Name" required>
            <button type="submit">Join</button>
        </form>
    </div>

    <script>
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
    </script>
</body>
</html>
